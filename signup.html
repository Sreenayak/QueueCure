<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - QueueCure</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="signup">
    <header class="site-header">
      <div class="container header-inner">
        <div class="site-brand">
          <div class="logo"><span class="brand-icon"></span>QueueCure</div>
          <div class="brand-subtitle">Create account</div>
        </div>
        <nav class="nav">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="receptionist.html">Reception</a>
          <a class="nav-link" href="waiting-room.html">Waiting Room</a>
        </nav>
        <div class="auth-actions">
          <a class="auth-link" href="login.html">Login</a>
        </div>
      </div>
    </header>
    <main class="container auth-page">
      <section class="auth-card">
        <h1>Create your QueueCure account</h1>
        <div class="form-row">
          <label for="signupName">Full name</label>
          <input id="signupName" type="text" placeholder="e.g. Aarav Mehta" />
        </div>
        <div class="form-row">
          <label for="signupEmail">Email address</label>
          <input id="signupEmail" type="email" placeholder="you@example.com" />
        </div>
        <div class="form-row">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" type="password" placeholder="••••••••" />
        </div>
        <button class="primary-btn auth-submit" id="signupSubmit">Sign Up</button>
        <p id="authMessage" class="form-message muted"></p>
        <p class="auth-note">Already have an account? <a href="login.html">Login</a></p>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container footer-inner">
        <div>QueueCure © 2026</div>
        <div>Sign up to manage your clinic queue and waiting room screens.</div>
      </div>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
