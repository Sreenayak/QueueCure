<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - QueueCure</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="login">
    <header class="site-header">
      <div class="container header-inner">
        <div class="site-brand">
          <div class="logo">QueueCure</div>
          <div class="brand-subtitle">Sign in</div>
        </div>
        <nav class="nav">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="receptionist.html">Reception</a>
          <a class="nav-link" href="waiting-room.html">Waiting Room</a>
        </nav>
        <div class="auth-actions">
          <a class="auth-cta" href="signup.html">Sign Up</a>
        </div>
      </div>
    </header>
    <main class="container auth-page">
      <section class="auth-card">
        <h1>Login to QueueCure</h1>
        <div class="form-row">
          <label for="loginEmail">Email address</label>
          <input id="loginEmail" type="email" placeholder="you@example.com" />
        </div>
        <div class="form-row">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="••••••••" />
        </div>
        <button class="primary-btn auth-submit">Login</button>
        <p class="auth-note">Don’t have an account? <a href="signup.html">Sign up</a></p>
      </section>
    </main>
  </body>
</html>
