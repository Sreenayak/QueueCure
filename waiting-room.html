<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waiting Room - QueueCure</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body id="waiting-room">
    <header class="site-header">
      <div class="container header-inner">
        <div class="site-brand">
          <div class="logo"><span class="brand-icon"></span>QueueCure</div>
          <div class="brand-subtitle">Patient waiting view</div>
        </div>
        <nav class="nav">
          <a class="nav-link" href="index.html">Home</a>
          <a class="nav-link" href="receptionist.html">Reception</a>
        </nav>
        <div class="auth-actions">
          <a class="auth-link" href="login.html">Login</a>
          <a class="auth-cta" href="signup.html">Sign Up</a>
        </div>
      </div>
    </header>
    <main class="container waiting-hero">
      <section class="display-left">
        <div class="display-card">
          <div class="now-label">NOW SERVING</div>
          <div id="displayCurrentToken" class="display-token">—</div>
          <div id="displayCurrentName" class="display-name muted">&nbsp;</div>
          <div class="display-note muted">Please proceed to the doctor's room</div>
        </div>
      </section>

      <aside class="display-right">
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-number" id="displayQueueCount">0</div>
            <div class="stat-label">In queue</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="displayAvg">15</div>
            <div class="stat-label">Min / patient</div>
          </div>
        </div>

        <section class="card up-next">
          <h4>UP NEXT</h4>
          <div id="waitingList" class="queue-list"></div>
        </section>
      </aside>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div>QueueCure © 2026</div>
        <div>Waiting room display updates live from the reception queue.</div>
      </div>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
